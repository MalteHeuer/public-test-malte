name: .NET Core for Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    environment: AzureC4A8CodeSigning
    permissions:
      id-token: write # This is required for requesting the JWT

    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:10.0

  steps:
    - uses: actions/checkout@v7
    - name: Update dependencies
      run: scripts/update_dependencies.sh
    - name: Install dependencies
      run: dotnet restore -r win-x64 ScepClient.csproj
    - name: Build
      run: dotnet build -p:Version=1.2.$GITHUB_RUN_NUMBER.500 --configuration Release --no-restore -r win-x64 ScepClient.csproj
    - name: Publish
      run: dotnet publish -p:Version=1.2.$GITHUB_RUN_NUMBER.500 --configuration Release --no-restore -r win-x64 -p:PublishSingleFile=true --no-self-contained ScepClient.csproj
    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: scepclient-win-x64
        path: bin/Release/net10.0/win-x64/publish/*